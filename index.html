<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GhostNode</title>

<style>

html{
scroll-behavior:smooth;
}

body{

background:#000;
color:#e6e6e6;

font-family:Consolas, monospace;

margin:0;
padding:20px;

overflow-y:auto;

}

/* subtle animated background */

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:

radial-gradient(circle at 20% 30%, rgba(0,255,156,.06) 1px, transparent 2px),

radial-gradient(circle at 80% 60%, rgba(0,255,156,.05) 1px, transparent 2px),

radial-gradient(circle at 40% 80%, rgba(0,255,156,.04) 1px, transparent 2px);

background-size:120px 120px;

animation:moveBG 60s linear infinite;

pointer-events:none;

z-index:-1;

}

@keyframes moveBG{

from{ transform:translateY(0); }
to{ transform:translateY(120px); }

}


/* layout */

.container{

max-width:720px;

margin:auto;

text-align:center;

}


/* logo */

.logo{

width:150px;

margin-bottom:10px;

filter:drop-shadow(0 0 18px rgba(255,0,0,.6));

}


/* title */

h2{

letter-spacing:4px;

margin-bottom:18px;

text-shadow:0 0 18px rgba(255,0,0,.7);

}


/* tabs */

.tabs{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:18px;

margin-bottom:18px;

}

.tab{

cursor:pointer;

color:#777;

font-size:15px;

padding-bottom:3px;

}

.tab.active{

color:#ff3b3b;

border-bottom:1px solid #ff3b3b;

}


/* boxes */

.box{

border:1px solid rgba(255,255,255,.06);

padding:20px;

margin:16px auto;

background:rgba(20,20,20,.75);

backdrop-filter:blur(6px);

max-width:520px;

line-height:1.6;

}


/* titles */

.title{

color:#ff3b3b;

margin-bottom:6px;

}


/* inputs */

input,select,button,textarea{

width:100%;

padding:14px;

margin-top:12px;

background:#000;

color:#00ff9c;

border:1px solid #111;

text-align:center;

box-sizing:border-box;

font-family:Consolas;

}


button{

border:1px solid #ff3b3b;

color:#fff;

cursor:pointer;

}

button:hover{

background:#ff3b3b;

color:#000;

}


a{

color:#00ff9c;

display:block;

margin-top:6px;

}


.hidden{

display:none;

}

</style>

</head>


<body>


<div class="container">


<img src="logo.png" class="logo">


<h2>GHOSTNODE</h2>



<div class="tabs">


<span class="tab active" onclick="showTab('search',this)">Search</span>

<span class="tab" onclick="showTab('tor',this)">Tor</span>

<span class="tab" onclick="showTab('vpn',this)">VPN</span>

<span class="tab" onclick="showTab('privacy',this)">Privacy</span>

<span class="tab" onclick="showTab('dns',this)">DNS</span>

<span class="tab" onclick="showTab('password',this)">Passwords</span>

<span class="tab" onclick="showTab('engines',this)">Engines</span>


</div>



<!-- SEARCH -->

<div id="searchTab">

<div class="box">

<div class="title">SEARCH WEB</div>

<input id="q" placeholder="search anonymously">

<select id="engine">

<option value="duck">DuckDuckGo</option>
<option value="brave">Brave</option>
<option value="searx">SearX</option>

</select>

<button onclick="go()">Search</button>

</div>

</div>



<!-- SECRET LOGIN -->

<div id="loginTab" class="hidden">

<div class="box">

<div class="title">ENTER PASSWORD</div>

<input id="pass" type="password">

<button onclick="checkPass()">Enter</button>

<div id="msg"></div>

</div>

</div>



<!-- SECRET PAGE -->

<div id="secretTab" class="hidden">


<div class="box">

<div class="title">LINUX COMMANDS</div>

ls → list files  

cd → change directory  

pwd → show path  

mkdir → create folder  

rm → delete file  

sudo apt update  

</div>


<div class="box">

<div class="title">HASH IDENTIFIER</div>

<textarea id="hash"></textarea>

<button onclick="identifyHash()">Identify</button>

<div id="hashResult"></div>

</div>


<div class="box">

<div class="title">BASE64</div>

<textarea id="b64"></textarea>

<button onclick="enc()">Encode</button>

<button onclick="dec()">Decode</button>

<div id="b64Result"></div>

</div>


<div class="box">

<div class="title">PASSWORD GENERATOR</div>

<button onclick="gen()">Generate</button>

<div id="pw"></div>

</div>


</div>



</div>



<script>

const trigger="3$!169857722"

const password="Node41925"


function showTab(tab,el){

document
.querySelectorAll("[id$='Tab']")
.forEach(t=>t.style.display="none")

document
.getElementById(tab+"Tab")
.style.display="block"

document
.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"))

el.classList.add("active")

}


function go(){

let q=document.getElementById("q").value

if(q===trigger){

searchTab.style.display="none"

loginTab.style.display="block"

return

}


let e=document.getElementById("engine").value

let url=""


if(e=="duck")
url="https://duckduckgo.com/?q="+q

if(e=="brave")
url="https://search.brave.com/search?q="+q

if(e=="searx")
url="https://searx.be/search?q="+q


window.open(url)

}


function checkPass(){

if(pass.value===password){

loginTab.style.display="none"

secretTab.style.display="block"

}else{

msg.innerText="incorrect"

}

}


function identifyHash(){

let h=hash.value

hashResult.innerText=

h.length==32?"MD5":

h.length==40?"SHA1":

h.length==64?"SHA256":

"unknown"

}


function enc(){

b64Result.innerText=btoa(b64.value)

}


function dec(){

b64Result.innerText=atob(b64.value)

}


function gen(){

let c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*"

let p=""

for(let i=0;i<16;i++){

p+=c[Math.floor(Math.random()*c.length)]

}

pw.innerText=p

}

</script>


</body>

</html>
