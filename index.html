<!DOCTYPE html>
<html>

<head>

<title>GhostNode</title>

<meta name="robots" content="noindex">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

background:#050000;
color:#ff3b3b;
font-family:monospace;
text-align:center;
margin:0;
padding-top:8%;

}

/* glowing title */

h1{

font-size:48px;
letter-spacing:6px;

text-shadow:
0 0 8px #ff0000,
0 0 25px #ff0000,
0 0 45px #ff0000;

margin-bottom:5px;

}

.subtitle{

opacity:0.7;
margin-bottom:35px;

}

/* search box */

input{

background:black;
border:1px solid #ff3b3b;
color:#ff3b3b;
padding:16px;
width:320px;
font-size:16px;

outline:none;

box-shadow:
0 0 12px #ff0000;

}

/* buttons */

button{

background:black;
border:1px solid #ff3b3b;
color:#ff3b3b;

padding:14px;
margin:10px;

cursor:pointer;

font-size:15px;

box-shadow:
0 0 12px #ff0000;

transition:.2s;

}

button:hover{

background:#140000;

box-shadow:
0 0 30px #ff0000;

}

/* addons panel */

.panel{

margin-top:45px;

padding:25px;

border:1px solid #ff3b3b;

display:inline-block;

box-shadow:
0 0 35px #ff0000;

}

/* popup */

.popup{

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:black;

border:1px solid #ff3b3b;

padding:30px;

display:none;

box-shadow:
0 0 40px #ff0000;

}

/* tor warning */

#warning{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#000000f0;

display:none;

justify-content:center;

align-items:center;

}

.warnbox{

border:1px solid #ff3b3b;

padding:35px;

box-shadow:
0 0 60px #ff0000;

}

.small{

opacity:0.6;
font-size:12px;

}

a{

text-decoration:none;

}

</style>

</head>

<body>

<h1>GHOSTNODE</h1>

<div class="subtitle">

PRIVATE • ANONYMOUS • SECURE

</div>

<input id="q" placeholder="search anonymously">

<br>

<button onclick="search()">

SEARCH

</button>

<br>

<button onclick="homepageGuide()">

MAKE HOMEPAGE

</button>

<div class="panel">

<h3>ADD-ONS</h3>

<a href="https://www.torproject.org/download/">

<button>

Tor Browser

</button>

</a>

<a href="https://protonvpn.com/download">

<button>

Proton VPN

</button>

</a>

<div class="small">

recommended for anonymity

</div>

</div>

<!-- homepage popup -->

<div class="popup" id="homepage">

<h3>SET AS HOMEPAGE</h3>

Chrome:
settings → homepage

<br><br>

Brave:
settings → homepage

<br><br>

Tor:
settings → home → custom URL

<br><br>

paste GhostNode link

<br><br>

<button onclick="closeHomepage()">

close

</button>

</div>

<!-- tor warning -->

<div id="warning">

<div class="warnbox">

<h2>WARNING</h2>

not using tor browser

<br><br>

for better anonymity use tor

<br><br>

<button onclick="continueSite()">

continue

</button>

<button onclick="getTor()">

download tor

</button>

</div>

</div>

<script>

function search(){

let q=document.getElementById("q").value

window.location="https://duckduckgo.com/?q="+q

}

function homepageGuide(){

document.getElementById("homepage").style.display="block"

}

function closeHomepage(){

document.getElementById("homepage").style.display="none"

}

function continueSite(){

document.getElementById("warning").style.display="none"

}

function getTor(){

window.location="https://www.torproject.org/download/"

}

/* simple browser check */

let ua=navigator.userAgent.toLowerCase()

if(

ua.includes("chrome") ||

ua.includes("safari") ||

ua.includes("edg")

){

document.getElementById("warning").style.display="flex"

}

</script>

</body>

</html>
